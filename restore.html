<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Returning Subscriber</title>
    <link rel="stylesheet" href="restore.css" />
  </head>
  <body>
    <div class="title-box-outer">
      <div class="title-box-inner">
        <div class="title-box-content">
          <h1 class="title">Returning Subscriber</h1>
        </div>
      </div>
    </div>
    <div class="direct-box-outer">
      <div class="direct-box-inner">
        <div class="direct-box-content">
          <h2 class="direction">
            Enter your email and let us handle the rest.
          </h2>
        </div>
      </div>
    </div>
    <div class="entry-box-outer">
      <div class="entry-box-inner">
        <div class="entry-box-content">
          <input
            class="email-box"
            id="email"
            type="email"
            placeholder="Enter email here."
          />
        </div>
      </div>
    </div>
    <div class="btn-box-outer">
      <div class="btn-box-inner">
        <div class="btn-box-content">
          <button class="restore">Restore</button>
        </div>
      </div>
    </div>
    <script src="restore.js"></script>
  </body>
</html>
