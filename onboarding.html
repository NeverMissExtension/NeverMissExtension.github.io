<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding</title>
    <link rel="stylesheet" href="onboarding.css" />
    <script src="https://js.stripe.com/v3/"></script>
  </head>
  <body>
    <div class="logo-box-outer">
      <div class="logo-box-inner">
        <div class="logo-box-content">
          <img src="NeverMissLogo.png" alt="NeverMiss logo" class="logo" />
        </div>
      </div>
    </div>
    <div class="cta-box-outer">
      <div class="cta-box-inner">
        <div class="cta-box-content">
          <h2 class="top-title">Unlock NeverMiss</h2>
          <p class="cta">
            Search chat history, never miss a message, and stay ahead.
          </p>
          <p class="price"><strong>$4.99 / month</strong></p>
          <button class="btn">Subscibe Now</button>
        </div>
      </div>
    </div>
    <script src="onboarding.js"></script>
  </body>
</html>
