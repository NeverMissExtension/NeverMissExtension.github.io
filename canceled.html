<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canceled</title>
    <link rel="stylesheet" href="canceled.css" />
  </head>
  <body>
    <div class="title-box-outer">
      <div class="title-box-inner">
        <div class="title-box-content">
          <h1 class="title">Manage Subscription</h1>
        </div>
      </div>
    </div>

    <div class="direct-box-outer">
      <div class="direct-box-inner">
        <div class="direct-box-content">
          <h2 class="direction">
            Click below to manage or cancel your subscription.
          </h2>
        </div>
      </div>
    </div>

    <div class="btn-box-outer">
      <div class="btn-box-inner">
        <div class="btn-box-content">
          <button class="manage">Open Billing Portal</button>
        </div>
      </div>
    </div>
    <script src="canceled.js"></script>
  </body>
</html>
